<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livraison Express Parakou</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#008000">

<style>
body {margin:0;font-family:Arial;background:#f2f2f2;}
header {background:linear-gradient(135deg,#008000,#00c853);color:white;padding:40px;text-align:center;}
.section {padding:25px;text-align:center;}
.card {background:white;padding:20px;margin:15px auto;border-radius:12px;max-width:420px;box-shadow:0 6px 15px rgba(0,0,0,0.1);}
.btn {display:inline-block;padding:10px 18px;margin-top:10px;background:#25D366;color:white;text-decoration:none;border-radius:8px;}
.floating-btn{position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:14px;border-radius:50%;font-size:22px;text-decoration:none;}
.admin-panel {display:none;padding:20px;background:#111;color:white;}
input {padding:8px;margin:5px;border-radius:6px;border:1px solid #ccc;}
</style>
</head>

<body>

<header>
<h1>🚀 Livraison Express Parakou</h1>
<p>Mini App Startup 4.0</p>
</header>

<div class="section">
<div class="card">
<h3>Commander une livraison</h3>
<input id="clientName" placeholder="Votre nom"><br>
<input id="clientOrder" placeholder="Votre commande"><br>
<button class="btn" onclick="saveOrder()">Envoyer commande</button>
</div>

<div class="card">
<h3>🎓 Abonnement Étudiant</h3>
<p>Pack Basic – 4 000 FCFA</p>
<p>Pack Premium – 8 000 FCFA</p>
<a class="btn" href="https://wa.me/22960772016?text=Je%20veux%20m'abonner">S'abonner</a>
</div>

<div class="card">
<h3>💳 Paiement Mobile Money</h3>
<p>Paiement via MTN / Moov</p>
<a class="btn" href="https://wa.me/22960772016?text=Je%20veux%20payer%20ma%20commande">Payer maintenant</a>
</div>
</div>

<div id="adminPanel" class="admin-panel">
<h2>📊 Tableau Admin</h2>
<div id="ordersList"></div>
<button onclick="logout()">Fermer admin</button>
</div>

<a class="floating-btn" onclick="openAdmin()">⚙️</a>

<script>

function saveOrder(){
let name = document.getElementById("clientName").value;
let order = document.getElementById("clientOrder").value;

if(name && order){
let orders = JSON.parse(localStorage.getItem("orders")) || [];
orders.push({name:name,order:order});
localStorage.setItem("orders",JSON.stringify(orders));
alert("Commande enregistrée !");
}
}

function openAdmin(){
let password = prompt("Mot de passe admin :");
if(password === "bello123"){
document.getElementById("adminPanel").style.display = "block";
loadOrders();
}
}

function loadOrders(){
let orders = JSON.parse(localStorage.getItem("orders")) || [];
let list="";
orders.forEach(o=>{
list += "<p>"+o.name+" : "+o.order+"</p>";
});
document.getElementById("ordersList").innerHTML=list;
}

function logout(){
document.getElementById("adminPanel").style.display="none";
}

</script>

</body>
</html>
